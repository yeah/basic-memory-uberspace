name: basic-memory

services:
  # TLS termination + automatic Let's Encrypt. The only service with published
  # ports. Remove this service if you front the stack with your own reverse
  # proxy (see DOCKER.md) — then publish the gateway instead.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN in your .env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - edge

  # The single auth entrypoint (OAuth 2.1 for /mcp, Basic Auth for /dav).
  gateway:
    build: .
    image: basic-memory-stack:latest
    restart: unless-stopped
    command: ["python", "auth_gateway.py"]
    env_file: .env
    environment:
      PORT: "8001"
      BASE_URL: "https://${DOMAIN:?set DOMAIN in your .env}"
      UPSTREAM_URL: "http://basicmemory:8000"
      DAV_UPSTREAM_URL: "http://wsgidav:8002"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/.well-known/oauth-protected-resource', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      basicmemory:
        condition: service_healthy
      wsgidav:
        condition: service_healthy
    networks:
      - edge
      - internal

  # Basic Memory MCP server. Internal only, no internet (internal network).
  basicmemory:
    build: .
    image: basic-memory-stack:latest
    restart: unless-stopped
    command: ["basic-memory", "mcp", "--transport", "streamable-http", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      HOME: /data            # default project -> /data/basic-memory, DB -> /data/.basic-memory
    volumes:
      - notes:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost', 8000), 3).close()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - internal

  # WebDAV view of the same notes. Internal only, no internet.
  wsgidav:
    build: .
    image: basic-memory-stack:latest
    restart: unless-stopped
    command: ["wsgidav", "--config", "/app/docker/wsgidav.yaml"]
    volumes:
      - notes:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost', 8002), 3).close()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal

volumes:
  notes:          # Markdown notes + Basic Memory SQLite index (shared)
  caddy_data:     # Let's Encrypt certificates and ACME account
  caddy_config:

networks:
  edge:
  internal:
    internal: true   # no outbound internet for basicmemory / wsgidav
