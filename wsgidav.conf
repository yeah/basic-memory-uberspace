# wsgidav.conf - WebDAV server config (Python format, auto-discovered).
#
# Why Python instead of YAML: WsgiDAV's YAML loader does not expand "~" or
# "$HOME" (it raises "Invalid path: .../~/basic-memory"). Python config lets us
# resolve the path at runtime, so nobody has to edit a hard-coded home path.
#
# Runs on 127.0.0.1 only and sits BEHIND auth_gateway, which enforces Basic
# Auth itself. WsgiDAV's own auth is therefore anonymous (the gateway is the
# gatekeeper). The share is mapped at /dav to match how the gateway proxies
# the /dav path through verbatim (no prefix stripping), so no mount_path here.

import os

# Notes directory: <home>/basic-memory, resolved at runtime. Override with the
# BASIC_MEMORY_DIR environment variable if your notes live elsewhere.
_notes_dir = os.environ.get(
    "BASIC_MEMORY_DIR",
    os.path.join(os.path.expanduser("~"), "basic-memory"),
)

host = "127.0.0.1"
port = 8002

# Expose the notes at the /dav URL prefix (matches the gateway).
provider_mapping = {
    "/dav": _notes_dir,
}

# Behind the gateway: no auth here, the gateway already authenticated the user.
simple_dc = {
    "user_mapping": {
        "*": True,  # anonymous access allowed (gateway enforces auth upstream)
    },
}

# --- For STANDALONE local testing only, replace the simple_dc above with:
# simple_dc = {
#     "user_mapping": {
#         "*": {
#             "testuser": {"password": "testpass", "roles": ["editor"]},
#         },
#     },
# }

property_manager = True
lock_storage = True

dir_browser = {
    "enable": True,
}

verbose = 3
logging = {
    "enable_loggers": [],
}
